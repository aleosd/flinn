name: CI

on:
  pull_request:
    paths-ignore:
      - '**/*.md'
  push:
    branches: [master]
    paths-ignore:
      - '**/*.md'

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.work
          cache: true

      - name: Install tools
        run: |
          GOVULNCHECK_VER=v1.2.0
          GOIMPORTS_VER=v0.31.0
          go install golang.org/x/vuln/cmd/govulncheck@${GOVULNCHECK_VER}
          go install golang.org/x/tools/cmd/goimports@${GOIMPORTS_VER}

      - name: Check formatting
        run: make fmt && git diff --exit-code

      - name: Vet
        run: make vet

      - name: Lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.10
          args: ./cmd/flinn/... ./... ./source/toml/...

      - name: Test
        run: make test

      - name: Vulnerability check
        run: make vulncheck